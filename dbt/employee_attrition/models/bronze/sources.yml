version: 2

sources:
  - name: bronze
    catalog: workspace
    schema: bronze
    description: "Raw ingested data from IBM HR Analytics CSV"
    tables:
      - name: ibm_hr_employee_attrition
        description: "Raw IBM HR Employee Attrition dataset — 1,470 rows × 35 columns. Loaded as-is from CSV via ingestion notebook."
        columns:
          - name: Age
            description: "Employee age in years"
            tests:
              - not_null
          - name: Attrition
            description: "Target variable — Yes/No"
            tests:
              - not_null
              - accepted_values:
                  values: ['Yes', 'No']
          - name: BusinessTravel
            description: "Travel frequency — Non-Travel, Travel_Rarely, Travel_Frequently"
            tests:
              - not_null
              - accepted_values:
                  values: ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently']
          - name: DailyRate
            description: "Daily pay rate"
          - name: Department
            description: "Employee department"
            tests:
              - not_null
              - accepted_values:
                  values: ['Sales', 'Research & Development', 'Human Resources']
          - name: DistanceFromHome
            description: "Distance from home in miles"
          - name: Education
            description: "Education level (1=Below College, 2=College, 3=Bachelor, 4=Master, 5=Doctor)"
          - name: EducationField
            description: "Field of education"
            tests:
              - not_null
          - name: EmployeeCount
            description: "Always 1 — constant column, drop in Silver"
          - name: EmployeeNumber
            description: "Unique employee ID"
            tests:
              - unique
              - not_null
          - name: EnvironmentSatisfaction
            description: "Environment satisfaction (1-4 scale)"
          - name: Gender
            description: "Male/Female"
            tests:
              - accepted_values:
                  values: ['Male', 'Female']
          - name: HourlyRate
            description: "Hourly pay rate"
          - name: JobInvolvement
            description: "Job involvement level (1-4 scale)"
          - name: JobLevel
            description: "Job level (1-5)"
          - name: JobRole
            description: "Job role title"
            tests:
              - not_null
          - name: JobSatisfaction
            description: "Job satisfaction (1-4 scale)"
          - name: MaritalStatus
            description: "Single, Married, Divorced"
            tests:
              - accepted_values:
                  values: ['Single', 'Married', 'Divorced']
          - name: MonthlyIncome
            description: "Monthly income in dollars"
          - name: MonthlyRate
            description: "Monthly rate"
          - name: NumCompaniesWorked
            description: "Number of companies worked at previously"
          - name: Over18
            description: "Always Y — constant column, drop in Silver"
          - name: OverTime
            description: "Whether employee works overtime — Yes/No"
            tests:
              - accepted_values:
                  values: ['Yes', 'No']
          - name: PercentSalaryHike
            description: "Percent salary hike last year"
          - name: PerformanceRating
            description: "Performance rating (3-4 in this dataset)"
          - name: RelationshipSatisfaction
            description: "Relationship satisfaction (1-4 scale)"
          - name: StandardHours
            description: "Always 80 — constant column, drop in Silver"
          - name: StockOptionLevel
            description: "Stock option level (0-3)"
          - name: TotalWorkingYears
            description: "Total years of work experience"
          - name: TrainingTimesLastYear
            description: "Number of trainings attended last year"
          - name: WorkLifeBalance
            description: "Work-life balance rating (1-4 scale)"
          - name: YearsAtCompany
            description: "Years at current company"
          - name: YearsInCurrentRole
            description: "Years in current role"
          - name: YearsSinceLastPromotion
            description: "Years since last promotion"
          - name: YearsWithCurrManager
            description: "Years with current manager"