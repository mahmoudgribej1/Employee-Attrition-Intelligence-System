version: 2

sources:
  - name: bronze
    description: "Raw data loaded from CSV files into Databricks"
    database: workspace
    schema: bronze
    
    tables:
      - name: employee_data
        description: "Raw employee HR data with 3,000 records"
        identifier: employee_data
        
        # Move meta into config block (dbt 1.11+ requirement)
        config:
          meta:
            data_quality_notes: "991 records have EmployeeStatus='Active' but ExitDate is not null"
        
        columns:
          - name: EmpID
            description: "Unique employee identifier"
            tests:
              - unique
              - not_null
          
          - name: FirstName
            description: "Employee first name"
          
          - name: LastName
            description: "Employee last name"
          
          - name: StartDate
            description: "Employment start date (format: dd-MMM-yy)"
          
          - name: ExitDate
            description: "Employment end date - 48.9% missing (active employees)"
          
          - name: Title
            description: "Job title/position"
          
          - name: Supervisor
            description: "Direct manager name"
          
          - name: ADEmail
            description: "Work email address"
          
          - name: BusinessUnit
            description: "Business unit assignment"
          
          - name: EmployeeStatus
            description: "Employment status (Active/Terminated)"
          
          - name: EmployeeType
            description: "Employment type (Full-time/Part-time/Contract)"
          
          - name: PayZone
            description: "Salary band/range"
          
          - name: EmployeeClassificationType
            description: "Employee classification category"
          
          - name: TerminationType
            description: "Reason category for termination"
          
          - name: TerminationDescription
            description: "Detailed termination reason - 48.9% missing"
          
          - name: DepartmentType
            description: "Department assignment"
          
          - name: Division
            description: "Division/business segment"
          
          - name: DOB
            description: "Date of birth"
          
          - name: State
            description: "Work location state"
          
          - name: JobFunctionDescription
            description: "Job role description"
          
          - name: GenderCode
            description: "Gender code"
          
          - name: LocationCode
            description: "Physical location code"
          
          - name: RaceDesc
            description: "Race/ethnicity description"
          
          - name: MaritalDesc
            description: "Marital status"
          
          - name: Performance Score
            description: "Performance rating"
          
          - name: Current Employee Rating
            description: "Latest performance rating"
      
      - name: employee_engagement_survey_data
        description: "Employee engagement survey responses - 3,000 records with no missing values"
        identifier: employee_engagement_survey_data
        
        config:
          meta:
            data_quality_notes: "94.14% of active employees have low engagement scores (≤3)"
        
        columns:
          - name: Employee ID
            description: "Employee identifier (links to employee_data.EmpID)"
            tests:
              - not_null
          
          - name: Survey Date
            description: "Date survey was completed"
          
          - name: Engagement Score
            description: "Engagement level score (typically 1-5 scale)"
            tests:
              - not_null
          
          - name: Satisfaction Score
            description: "Job satisfaction score"
            tests:
              - not_null
          
          - name: Work-Life Balance Score
            description: "Work-life balance rating"
            tests:
              - not_null
      
      - name: recruitment_data
        description: "Job applications and hiring pipeline - 3,000 records"
        identifier: recruitment_data
        
        config:
          meta:
            data_quality_notes: "0 hired candidates - no successful recruitments in this dataset"
        
        columns:
          - name: Applicant ID
            description: "Unique applicant identifier"
            tests:
              - unique
              - not_null
          
          - name: Application Date
            description: "Date application was submitted"
          
          - name: First Name
            description: "Applicant first name"
          
          - name: Last Name
            description: "Applicant last name"
          
          - name: Gender
            description: "Applicant gender"
          
          - name: Date of Birth
            description: "Applicant date of birth"
          
          - name: Phone Number
            description: "Contact phone"
          
          - name: Email
            description: "Contact email"
          
          - name: Address
            description: "Residential address"
          
          - name: City
            description: "City of residence"
          
          - name: State
            description: "State of residence"
          
          - name: Zip Code
            description: "Postal code"
          
          - name: Country
            description: "Country of residence"
          
          - name: Education Level
            description: "Highest education achieved"
          
          - name: Years of Experience
            description: "Years of relevant experience"
          
          - name: Desired Salary
            description: "Expected salary"
          
          - name: Job Title
            description: "Position applied for"
          
          - name: Status
            description: "Application status (Applied/Interviewed/Offered/Hired/Rejected)"
      
      - name: training_and_development_data
        description: "Employee training program records - 3,000 sessions"
        identifier: training_and_development_data
        
        config:
          meta:
            training_summary: "Total investment: $1,675,886.09 across 3,000 employees ($558.63 per employee)"
        
        columns:
          - name: Employee ID
            description: "Employee identifier"
            tests:
              - not_null
          
          - name: Training Date
            description: "Date training was conducted"
          
          - name: Training Program Name
            description: "Name of training program"
          
          - name: Training Type
            description: "Category/format of training"
          
          - name: Training Outcome
            description: "Result (Completed/Failed/In Progress)"
          
          - name: Location
            description: "Training venue"
          
          - name: Trainer
            description: "Training instructor"
          
          - name: Training Duration(Days)
            description: "Length of training in days"
          
          - name: Training Cost
            description: "Cost of training program"